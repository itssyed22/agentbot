<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot</title>
  <style>
    body { font-family: sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; }
    h2 { font-size: 18px; margin-bottom: 16px; }
    #chat { border: 1px solid #ddd; border-radius: 12px; height: 400px; overflow-y: auto; padding: 16px; margin-bottom: 12px; }
    .msg { margin: 8px 0; padding: 10px 14px; border-radius: 10px; max-width: 80%; font-size: 14px; line-height: 1.5; }
    .user { background: #e8f4ff; margin-left: auto; text-align: right; }
    .bot { background: #f5f5f5; }
    #input-row { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    button { padding: 10px 18px; background: #1D9E75; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Dental Clinic Assistant</h2>
  <div id="chat">
    <div class="msg bot">Hi! I am your dental clinic assistant. How can I help you today?</div>
  </div>
  <div id="input-row">
    <input id="msg" placeholder="Type your question..." />
    <button onclick="send()">Send</button>
  </div>
  <script>
    async function send() {
      const input = document.getElementById('msg');
      const msg = input.value.trim();
      if (!msg) return;
      addMsg(msg, 'user');
      input.value = '';
      addMsg('Typing...', 'bot', 'typing');
      const res = await fetch('http://localhost:3000/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      document.getElementById('typing').remove();
      addMsg(data.reply, 'bot');
    }
    function addMsg(text, who, id) {
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      div.textContent = text;
      if (id) div.id = id;
      const chat = document.getElementById('chat');
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
    document.getElementById('msg').addEventListener('keydown', e => e.key === 'Enter' && send());
  </script>
</body>
</html>
